server {
    listen 6600;
    server_name 213.199.60.172;

    # === FRONTEND React SPA ===
    root /var/www/apexpos/frontend;
    index index.html;

    # === BACKEND Laravel API ===
    location /api {
        alias /var/www/apexpos/backend/public;
        try_files $uri $uri/ @laravel;

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME /var/www/apexpos/backend/public/index.php;
            include fastcgi_params;
            fastcgi_param REQUEST_URI $request_uri;
        }
    }

    location @laravel {
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/apexpos/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Accès au stockage Laravel (logos, uploads)
    location /storage {
        alias /var/www/apexpos/backend/storage/app/public;
        try_files $uri =404;
    }

    # SPA fallback - toutes les routes React redirigent vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Taille max upload (pour logos, imports)
    client_max_body_size 10M;
}
